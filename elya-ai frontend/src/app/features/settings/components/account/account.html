<div class="settings-card">

    <h2>Account</h2>

    <p class="subtitle">
        Manage your profile information.
    </p>

    <div class="avatar-section">

        <div class="avatar">

            V

        </div>

        <button class="secondary-btn">

            Change Avatar

        </button>

    </div>

    <div class="form-group">

        <label>Display Name</label>

        <input
            type="text"
            placeholder="Vardhan">

    </div>

    <div class="form-group">

        <label>Email</label>

        <input
            type="email"
            placeholder="vardhan@example.com">

    </div>

    <button class="primary-btn">

        Save Changes

    </button>

</div>
