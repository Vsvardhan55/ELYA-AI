<h2>AI Model</h2>

<div class="setting-card">

  <label for="model">Model</label>

  <select id="model">

    <option>llama3:8b</option>
    <option>qwen2.5:7b</option>
    <option>deepseek-r1:8b</option>
    <option>mistral</option>

  </select>

</div>

<div class="setting-card">

  <label for="temperature">Temperature</label>

  <input
    id="temperature"
    type="range"
    min="0"
    max="1"
    step="0.1">

</div>
