<div class="auth-container">

    <div class="card">

        <h1>Create Account</h1>

        <input

            type="text"

            placeholder="Full Name"

            [(ngModel)]="fullName">

        <input

            type="email"

            placeholder="Email"

            [(ngModel)]="email">

        <input

            type="password"

            placeholder="Password"

            [(ngModel)]="password">

        <button

            (click)="register()"

            [disabled]="loading">

            {{ loading ? 'Creating...' : 'Register' }}

        </button>

        <div

            class="error"

            *ngIf="error">

            {{error}}

        </div>

        <p>

            Already have an account?

            <a routerLink="/login">

                Login

            </a>

        </p>

    </div>

</div>
