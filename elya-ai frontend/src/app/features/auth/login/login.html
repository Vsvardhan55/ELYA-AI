<div class="auth-container">

    <div class="card">

        <h1>ELYA AI</h1>

        <p>Welcome Back</p>

        <input
            type="email"
            placeholder="Email"
            [(ngModel)]="email">

        <input
            type="password"
            placeholder="Password"
            [(ngModel)]="password">

        <button
            (click)="login()"
            [disabled]="loading">

            {{ loading ? 'Signing In...' : 'Login' }}

        </button>

        <div
            class="error"
            *ngIf="error">

            {{error}}

        </div>

        <p>

            Don't have an account?

            <a routerLink="/register">

                Register

            </a>

        </p>

    </div>

</div>
